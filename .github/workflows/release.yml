name: Build & Release Native Binaries

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            platform: darwin-arm64
            os: macos-14

          - target: bun-windows-x64
            platform: win-x64
            os: windows-latest

          - target: bun-linux-x64
            platform: linux-x64
            os: ubuntu-latest

          - target: bun-linux-arm64
            platform: linux-arm64
            os: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Extract metadata
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(basename "$GITHUB_REPOSITORY")

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "NAME=$NAME" >> $GITHUB_ENV

      - name: Prepare output directory
        shell: bash
        run: mkdir -p bin

      - name: Build binary
        shell: bash
        run: |
          OUT="./bin/${{ env.NAME }}-v${{ env.VERSION }}-${{ matrix.platform }}"

          bun build ./src/index.ts \
            --compile \
            --production \
            --minify \
            --target=${{ matrix.target }} \
            --define:process.env.VERSION='"${{ env.VERSION }}"' \
            --outfile="$OUT"

      - name: Copy assets
        shell: bash
        run: bun run postbuild:bin

      - name: Create archive
        shell: bash
        run: |
          cd bin

          if [[ "${{ matrix.os }}" == windows-latest ]]; then
            7z a "${{ env.NAME }}-v${{ env.VERSION }}-${{ matrix.platform }}.zip" *
          else
            tar -czf "${{ env.NAME }}-v${{ env.VERSION }}-${{ matrix.platform }}.tar.gz" *
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            bin/*.zip
            bin/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
